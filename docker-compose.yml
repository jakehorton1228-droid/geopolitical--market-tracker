# Geopolitical Market Tracker - Docker Compose
#
# USAGE:
#   docker compose up -d          # Start all services
#   docker compose up -d db       # Start only database
#   docker compose logs -f        # View logs
#   docker compose down           # Stop all services
#
# SERVICES:
#   - db:             PostgreSQL database (port 5432)
#   - api:            FastAPI REST API (port 8000)
#   - frontend:       React app via nginx (port 3000)
#   - prefect-server: Prefect UI + API (port 4200)
#   - prefect-worker: Runs scheduled daily pipeline
#   - ollama:         Local LLM inference (port 11434)
#   - mlflow:         ML experiment tracking UI (port 5000)
#
# ACCESS:
#   - Frontend:    http://localhost:3000
#   - API Docs:    http://localhost:8000/docs
#   - Prefect UI:  http://localhost:4200
#   - MLflow UI:   http://localhost:5000

services:
  # ===========================================================================
  # DATABASE
  # ===========================================================================
  db:
    image: pgvector/pgvector:pg15
    container_name: gmt-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geopolitical_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # FASTAPI REST API
  # ===========================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: gmt-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geopolitical_tracker
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-gmip-intelligence-pipeline}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ===========================================================================
  # REACT FRONTEND
  # ===========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gmt-frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # PREFECT ORCHESTRATION
  # ===========================================================================
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: gmt-prefect
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
    restart: unless-stopped

  prefect-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: gmt-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geopolitical_tracker
      PREFECT_API_URL: http://prefect-server:4200/api
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    depends_on:
      - prefect-server
      - db
      - mlflow
    restart: unless-stopped

  # ===========================================================================
  # OLLAMA (local LLM inference)
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: gmt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # MLFLOW (experiment tracking)
  # ===========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: gmt-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # ===========================================================================
  # DATABASE MIGRATIONS (run once then exit)
  # ===========================================================================
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: gmt-migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geopolitical_tracker
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - setup

volumes:
  pgdata:
    name: gmt-pgdata
  ollama_models:
    name: gmt-ollama-models
  mlflow_data:
    name: gmt-mlflow-data
