gmip:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('GMIP_DB_HOST', 'localhost') }}"
      port: "{{ env_var('GMIP_DB_PORT', '5432') | int }}"
      user: "{{ env_var('GMIP_DB_USER', 'gmt') }}"
      password: "{{ env_var('GMIP_DB_PASSWORD', 'gmt_password') }}"
      dbname: "{{ env_var('GMIP_DB_NAME', 'geopolitical_market_tracker') }}"
      schema: public
      threads: 4
