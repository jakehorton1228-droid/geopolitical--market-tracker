version: 2

sources:
  # Bronze = raw ingestion tables, written by the Python extract-load layer.
  # dbt (via DuckDB) reads these but never writes them — Alembic owns their schema.
  - name: bronze
    description: "Raw ingestion tables (Bronze layer), written by Python EL."
    database: pg
    schema: public
    tables:
      - name: events
        description: "Raw GDELT events (significant-event filtered at load)."
        columns:
          - name: global_event_id
            description: "GDELT unique event id"
          - name: event_date
            description: "Date the event occurred"
          - name: event_root_code
            description: "CAMEO root code (01-20)"
          - name: action_geo_country_code
            description: "FIPS 10-4 country code where the event occurred"
      - name: market_data
        description: "Raw Yahoo Finance OHLCV per symbol per day."
      - name: news_headlines
        description: "Raw RSS headlines; sentiment/embeddings added by the enrich stage."
      - name: economic_indicators
        description: "FRED economic indicator observations"
        columns:
          - name: series_id
            description: "FRED series identifier (GDP, CPIAUCSL, UNRATE, DFF, DGS10, UMCSENT)"
          - name: date
            description: "Observation date"
          - name: value
            description: "Indicator value"
      - name: analysis_results
        description: "Event study and anomaly detection results"
        columns:
          - name: symbol
            description: "Market symbol analyzed"
          - name: is_anomaly
            description: "Whether this result was flagged as anomalous"

  # NOTE: There is no `silver` source anymore. All four Silver tables are now dbt
  # models (models/silver/), referenced downstream via ref() for full lineage.
