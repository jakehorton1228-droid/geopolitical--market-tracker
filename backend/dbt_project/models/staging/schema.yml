version: 2

models:
  # stg_events is tested at the silver_events model (models/silver/schema.yml).
  - name: stg_market
    description: "Staging view over silver_market — passthrough for lineage"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: close
        tests:
          - not_null

  - name: stg_headlines
    description: "Staging view over silver_headlines — passthrough for lineage"
    columns:
      - name: headline_id
        tests:
          - not_null
      - name: published_date
        tests:
          - not_null

  - name: stg_event_market
    description: "Staging view over silver_event_market — passthrough for lineage"
    columns:
      - name: event_date
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
